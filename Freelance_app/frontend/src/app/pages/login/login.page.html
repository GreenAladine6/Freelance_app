<ion-content class="login-content">
  <div class="back-header">
    <ion-back-button defaultHref="/" class="back-btn"></ion-back-button>
    <span class="header-title">Welcome Back</span>
  </div>

  <div class="login-container">
    <!-- Avatar -->
    <div class="avatar-wrapper">
      <div class="avatar">FH</div>
    </div>

    <!-- Title -->
    <h1 class="sign-in-title">Sign In</h1>
    <p class="sign-in-sub">Welcome back! Please enter your details.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Email Field -->
      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="custom-input">
          </ion-input>
        </div>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <div class="label-row">
          <label class="field-label">Password</label>
          <a class="forgot-link" routerLink="/forgot-password">Forgot Password?</a>
        </div>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="custom-input">
          </ion-input>
          <ion-icon
            [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"
            class="input-icon-right"
            (click)="togglePassword()">
          </ion-icon>
        </div>
      </div>

      <!-- Sign In Button -->
      <button
        type="submit"
        class="sign-in-btn"
        [disabled]="loginForm.invalid || loading">
        <ion-spinner *ngIf="loading" name="crescent" class="btn-spinner"></ion-spinner>
        <span *ngIf="!loading">Sign In</span>
      </button>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">OR</span>
        <span class="divider-line"></span>
      </div>

      <!-- Google Button -->
      <button type="button" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </form>
  </div>
</ion-content>
