<ion-content class="login-content">
  <div class="back-header">
    <ion-back-button defaultHref="/" class="back-btn"></ion-back-button>
    <span class="header-title">Welcome Back</span>
  </div>

  <div class="login-container">
    <!-- Avatar -->
    <div class="avatar-wrapper">
      <div class="avatar">FH</div>
    </div>

    <!-- Title -->
    <h1 class="sign-in-title">Sign In</h1>
    <p class="sign-in-sub">Welcome back! Please enter your details.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Email Field -->
      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="custom-input">
          </ion-input>
        </div>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <div class="label-row">
          <label class="field-label">Password</label>
          <a class="forgot-link" routerLink="/forgot-password">Forgot Password?</a>
        </div>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="custom-input">
          </ion-input>
          <ion-icon
            [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"
            class="input-icon-right"
            (click)="togglePassword()">
          </ion-icon>
        </div>
      </div>

      <!-- Sign In Button -->
      <button
        type="submit"
        class="sign-in-btn"
        [disabled]="loginForm.invalid || loading">
        <ion-spinner *ngIf="loading" name="crescent" class="btn-spinner"></ion-spinner>
        <span *ngIf="!loading">Sign In</span>
      </button>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">OR</span>
        <span class="divider-line"></span>
      </div>

      <!-- Google Button -->
      <div id="g_id_onload"
        data-client_id="3602544192-stcts2j1bbj5gkrb6li6sqhgj0ela0vm.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>

    </form>
  </div>
</ion-content>
