<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="defaultBackRoute"></ion-back-button>
    </ion-buttons>
    <ion-title>Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="notifications.length > 0" (click)="markAllAsRead()">
        Mark all
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="notifications-content">
  <ion-refresher slot="fixed" (ionRefresh)="refreshNotifications($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="page-wrap">
    <div class="header-card" *ngIf="notifications.length > 0">
      <p class="header-title">Updates</p>
      <p class="header-subtitle">Manage job activity and application decisions</p>
    </div>

    <div *ngIf="notifications.length === 0 && !isLoading" class="empty-state card">
      <ion-icon class="empty-icon" name="notifications-outline"></ion-icon>
      <p class="empty-text">No notifications yet</p>
      <p class="empty-subtext">Job applications and decisions will appear here</p>
    </div>

    <div *ngIf="isLoading && notifications.length === 0" class="loading-state card">
      <ion-spinner></ion-spinner>
    </div>

    <div class="notification-list" *ngIf="notifications.length > 0">
      <a
        class="notification-card"
        *ngFor="let notification of notifications"
        [class.unread]="!notification.is_read"
        [routerLink]="getNotificationLink(notification)"
        (click)="markAsRead(notification)">
        <div class="notification-icon" [class.read]="notification.is_read">
          <ion-icon [name]="notification.notification_type === 'job_application' ? 'briefcase-outline' : 'notifications-outline'"></ion-icon>
        </div>

        <div class="notification-body">
          <div class="notification-title-row">
            <h2>{{ notification.title }}</h2>
            <span *ngIf="!notification.is_read" class="unread-pill">New</span>
          </div>
          <p class="notification-message">{{ notification.message }}</p>
          <p class="notification-time">{{ getTimeAgo(notification.created_at) }}</p>
        </div>
      </a>
    </div>
  </div>

  <ion-infinite-scroll (ionInfinite)="onLoadMore($event)" threshold="100px" *ngIf="notifications.length < totalCount">
    <ion-infinite-scroll-content loadingSpinner="crescent" loadingText="Loading more notifications...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
